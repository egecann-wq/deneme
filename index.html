<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sadece Bizim İçin ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Dancing+Script:wght@600&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --spotify-green: #1DB954;
            --spotify-black: #121212;
            --spotify-grey: #b3b3b3;
            --accent-pink: #ff4b6e;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--spotify-black);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Arka Plan Görseli */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('wallpaper.jfif'); 
            background-size: cover;
            background-position: center;
            filter: blur(15px) brightness(0.2); 
            z-index: -2;
            transform: scale(1.1);
        }

        /* Köşelerdeki Neon Kalpler */
        .neon-heart {
            position: fixed;
            z-index: -1;
            pointer-events: none;
            opacity: 0.8;
        }

        .top-left { top: 10%; left: 10%; }
        .bottom-right { bottom: 15%; right: 15%; }

        .heart-shape {
            width: 60px;
            height: 60px;
            background-color: var(--accent-pink);
            position: relative;
            transform: rotate(-45deg);
            box-shadow: 0 0 30px var(--accent-pink), 0 0 60px var(--accent-pink);
            animation: heartBeat 2s ease-in-out infinite;
        }

        .heart-shape::before,
        .heart-shape::after {
            content: "";
            width: 60px;
            height: 60px;
            background-color: var(--accent-pink);
            border-radius: 50%;
            position: absolute;
        }

        .heart-shape::before { top: -30px; left: 0; }
        .heart-shape::after { left: 30px; top: 0; }

        @keyframes heartBeat {
            0% { transform: rotate(-45deg) scale(1); filter: brightness(1); opacity: 0.6; }
            50% { transform: rotate(-45deg) scale(1.1); filter: brightness(1.4); opacity: 0.9; }
            100% { transform: rotate(-45deg) scale(1); filter: brightness(1); opacity: 0.6; }
        }

        .container {
            width: 90%;
            max-width: 500px;
            background: rgba(18, 18, 18, 0.65);
            backdrop-filter: blur(25px);
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            transition: all 0.5s ease-in-out;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 5;
        }

        /* Aktif modda container genişliği */
        .card-active.container {
            max-width: 750px;
        }

        .playlist-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .playlist-header img {
            width: 100px;
            height: 100px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            object-fit: cover;
        }

        .playlist-info h1 { 
            margin: 5px 0; 
            font-size: 1.4em; 
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
        }

        .playlist-info p { 
            color: var(--accent-pink); 
            font-family: 'Dancing Script', cursive; 
            font-size: 1.2em; 
            margin: 0; 
        }

        .song-list {
            list-style: none;
            padding: 0;
            overflow-y: auto;
            flex-grow: 1;
            scrollbar-width: thin;
            scrollbar-color: var(--spotify-green) transparent;
        }

        /* Şarkı seçildiğinde listeyi tamamen gizle */
        .card-active .playlist-header,
        .card-active .song-list {
            display: none !important;
        }

        .song-item {
            display: grid;
            grid-template-columns: 30px 45px 1fr 50px;
            align-items: center;
            padding: 12px 8px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .song-item:hover { background-color: rgba(255, 255, 255, 0.1); }
        .song-item.active-song { background-color: rgba(29, 185, 84, 0.15); }
        .song-index { color: var(--spotify-grey); font-size: 0.85em; }
        
        .song-img { 
            width: 38px; 
            height: 38px; 
            border-radius: 6px; 
            background: #333; 
            background-size: cover;
            background-position: center;
        }
        
        .song-details { padding-left: 10px; overflow: hidden; }
        .song-details div { font-weight: 500; font-size: 0.9em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-details span { color: var(--spotify-grey); font-size: 0.8em; }
        .song-time { color: var(--spotify-grey); font-size: 0.75em; text-align: right; }

        /* Gelişmiş Şarkı Detay Paneli */
        #verse-card {
            display: none;
            flex-direction: column;
            width: 100%;
        }

        .card-active #verse-card {
            display: flex;
        }

        .player-layout {
            display: flex;
            gap: 30px;
            align-items: stretch; /* Dikeyde iki tarafın yüksekliğini eşitler */
            margin-top: 15px;
        }

        /* Sol Taraf: Büyük Kapak Resmi ve Altındaki Kontroller */
        .player-left {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        #big-cover {
            width: 240px;
            height: 240px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            background-size: cover;
            background-position: center;
            background-color: #333;
            transition: transform 0.3s ease;
        }

        /* Sağ Taraf: Şarkı Sözleri Paneli (Hizalamalar güncellendi) */
        .player-right {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            justify-content: center; /* Dikey eksende tam ortalar */
            align-items: center;     /* Yatay eksende tam ortalar */
            border-left: 1px solid rgba(255,255,255,0.1);
            padding-left: 25px;
            max-height: 340px;
            overflow-y: auto;
        }

        /* Şarkı Sözleri Metni */
        .verse-text {
            font-size: 1.25em;
            font-weight: 700;
            line-height: 1.6;
            color: #fff;
            white-space: pre-line;
            font-family: 'Montserrat', sans-serif;
            text-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-align: center; /* Sözleri kendi içinde ortalar */
            width: 100%;
        }

        .custom-player {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 5px;
        }

        .progress-container {
            width: 100%;
            height: 5px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            cursor: pointer;
        }

        .progress-bar {
            height: 100%;
            background: var(--spotify-green);
            border-radius: 10px;
            width: 0%;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.75em;
            color: var(--spotify-grey);
            margin-top: -6px;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
        }

        .nav-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.6em;
            cursor: pointer;
            transition: 0.2s;
        }
        .nav-btn:hover { color: var(--accent-pink); }

        .play-btn {
            background: white;
            color: black;
            width: 54px; height: 54px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 1.5em;
            transition: 0.2s;
        }
        .play-btn:hover { transform: scale(1.05); }

        .back-btn {
            background: none;
            border: none;
            color: var(--spotify-grey);
            font-size: 1.1em;
            cursor: pointer;
            align-self: flex-start;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.2s;
        }
        .back-btn:hover { color: white; }

        #login-screen {
            text-align: center;
            background: rgba(18, 18, 18, 0.8);
            padding: 40px; border-radius: 30px;
            backdrop-filter: blur(15px);
            z-index: 10;
        }
        
        input { background: rgba(255,255,255,0.05); border: 1px solid #444; padding: 14px; color: white; border-radius: 30px; width: 220px; text-align: center; outline: none; margin-top: 15px; }
        button { background: var(--spotify-green); border: none; padding: 14px 40px; color: black; font-weight: bold; border-radius: 30px; cursor: pointer; margin-top: 25px; }

        .hidden { display: none !important; }

        @media (max-width: 600px) {
            .card-active.container { max-width: 90%; }
            .player-layout { flex-direction: column; gap: 20px; }
            .player-right { border-left: none; padding-left: 0; text-align: center; max-height: 150px; }
            .verse-text { text-align: center; font-size: 1em; }
            #big-cover { width: 180px; height: 180px; }
        }
    </style>
</head>
<body>

    <div class="neon-heart top-left"><div class="heart-shape"></div></div>
    <div class="neon-heart bottom-right"><div class="heart-shape"></div></div>

    <div id="login-screen">
        <h1 style="margin: 0; font-size: 2.5em;">💕</h1>
        <h2 style="font-family: 'Dancing Script'; color: var(--accent-pink); font-size: 2.6em;">Kalbimin Sesi</h2>
        <input type="text" id="password" placeholder="GG.AA.YYYY">
        <br>
        <button onclick="checkPassword()">Kilidi Aç</button>
    </div>

    <div id="main-content" class="container hidden">
        <div class="playlist-header">
            <img src="Uzi el chavo sevgilisi.jfif" alt="Bizim Fotoğrafımız">
            <div class="playlist-info">
                <p>Dünyam'a Özel Çalma Listesi</p>
                <h1>Kalbimin Şarkıları ❤️</h1>
                <p style="font-family: 'Inter'; font-style: normal; color: white; font-size: 0.9em;">Mehmet Can • 2026</p>
            </div>
        </div>

        <div class="song-list" id="song-list-container"></div>

        <div id="verse-card">
            <button class="back-btn" onclick="backToPlaylist()">↩ Listeye Dön</button>
            <div id="song-title-display" style="font-size: 1.1em; font-weight: 700; font-family: 'Montserrat'; color: var(--accent-pink); margin-bottom: 5px;">Şarkı Adı</div>
            <div id="song-artist-display" style="font-size: 0.85em; color: var(--spotify-grey); margin-bottom: 15px;">Sanatçı</div>
            
            <div class="player-layout">
                <div class="player-left">
                    <div id="big-cover"></div>
                    
                    <div class="custom-player">
                        <div class="progress-container" onclick="seek(event)">
                            <div class="progress-bar" id="progress"></div>
                        </div>
                        <div class="time-info">
                            <span id="current-time">0:00</span>
                            <span id="duration">0:00</span>
                        </div>
                        <div class="controls">
                            <button class="nav-btn" onclick="prevSong()">⏮</button>
                            <div class="play-btn" onclick="togglePlay()" id="play-trigger">▶</div>
                            <button class="nav-btn" onclick="nextSong()">⏭</button>
                        </div>
                    </div>
                </div>

                <div class="player-right">
                    <div class="verse-text" id="card-verse-text"></div>
                </div>
            </div>
            
            <audio id="player" style="display:none;"><source id="audio-source" src="" type="audio/mpeg"></audio>
        </div>
    </div>

    <script>
        const songs = [
            { file: '1.mp3', img: 'sezen.jpg', title: 'Haydi Gel Benimle Ol', artist: 'Sezen Aksu', time: '4:31', verse: 'Haydi gel benimle ol, oturup yıldızlardan Bakalım dünyadaki neslimize' },
            { file: '2.mp3', img: 'skapova.jpg', title: 'Neden Bu Kadar Güzelsin?', artist: 'Skapova', time: '2:58', verse: 'Hadi gel bana, hadi ol benim... Sen benimsin, neden bu kadar güzelsin? Taktım aklımı sana ben, sen çok özelsin' },
            { 
                file: '3.mp3', 
                img: 'ezhel.jpg',
                title: 'İmkansızım', 
                artist: 'Ezhel', 
                time: '3:42', 
                verse: `Yüzünde benleri tane tane\nTürkü gibi bi' kadın ve şahane\nAdını haykırıp derler, "Hırsız var"\nÇaldın kalbim', kaldım dımdızlak` 
            },
            { file: '4.mp3', img: 'uzi.jpg', title: 'CINDY', artist: 'UZI', time: '1:59', verse: "Ben seni seçtim, bi' köşede krallığım dururken" },
            { file: '5.mp3', img: 'cem_adrian.jpg', title: 'Sen Benim Şarkılarımsın', artist: 'Cem Adrian, Hande Mehan', time: '3:32', verse: "Gündüzümde gecemdesin\nÇalınmasın söylenmesin\nSen benim şarkılarımsın" },
            { file: '6.mp3', img: 'zaaf.jpg', title: 'Gördüğüm En Güzel Şey', artist: 'Zaaf', time: '2:52', verse: "Gördüğüm en güzel şey\nOnun gözleri olmalı" },
            { file: '7.mp3', img: 'duman.jpg', title: 'Elleri Ellerime', artist: 'Duman', time: '4:16', verse: "Elleri ellerime, gözleri gözlerime\nKarışan bir sen olsan" },
            { file: '8.mp3', img: 'zakkum.jpg', title: 'Seni Rastgele Sevmedim', artist: 'Zakkum', time: '2:40', verse: "Ben seni rastgele sevmedim ki\nİhtimallerden seçmedim ki" },
            { file: '9.mp3', img: 'rafat.jpg', title: 'Kısa Mesafe', artist: 'Rafat Hasanlı', time: '2:27', verse: "Bu şarkı her şeyiyle bizi anlatıyor..." },
            { file: '10.mp3', img: 'rafat2.jpg', title: 'Eserdin Tenimde', artist: 'Rafat Hasanlı', time: '2:21', verse: "Seni ilk gördüğümde, sevdim nedensizce\nEserdin tenimde" },
            { file: '11.mp3', img: 'allame.jpg', title: 'Kenar Mahalle', artist: 'Allame', time: '3:25', verse: "Sen tahtını kurdun kalbimin\nEn fakir kenar mahallesine" },
            { file: '12.mp3', img: 'ozbi.jpg', title: 'Geceyi Anlatmış', artist: 'Ozbi', time: '4:00', verse: 'Günü geceye götürüp\nYine getiren, o' },
            { file: '13.mp3', img: 'chiko.jpg', title: 'Her Şey Senle Güzel', artist: 'Chiko', time: '1:49', verse: 'Ölene dek hayatımın her güzelliği ve\nEn güzeli sen olacaksın\nEn değerlim... ' },
            { file: '14.mp3', img: 'uzi2.jpg', title: '1 YIL', artist: 'UZI', time: '2:51', verse: 'Sanki güzelliği topraktan almış\nAşk diye bi` duygu\nHarbiden varmış' },
            { file: '15.mp3', img: 'emre_fel.jpg', title: 'Senden Güzeli Mi Var', artist: 'Emre Fel', time: '3:23', verse: 'Aşka karşı diyarda bi` senden\nGüzeli mi var, be güzelim?' },
            { file: '16.mp3', img: 'nilufer.jpg', title: 'Ta Uzak Yollardan', artist: 'Nilüfer', time: '3:33', verse: 'Artık yanımda beni\nBenden çok seven\nDünyalar benim olsa\nYine de istemem\nYalnız sensin benim\nYüzümü güldüren' },
            { file: '17.mp3', img: 'dktt.jpg', title: 'Dilerim Ki', artist: 'Dolu Kadehi Ters Tut', time: '3:20', verse: 'Dilerim Ki asla caymazsın\nBenim olmaktan' }
        ];

        const listContainer = document.getElementById('song-list-container');
        const audio = document.getElementById('player');
        const playBtn = document.getElementById('play-trigger');
        let currentSongIndex = -1;

        songs.forEach((song, index) => {
            const item = document.createElement('div');
            item.className = 'song-item';
            item.onclick = () => selectSong(index);
            item.innerHTML = `
                <div class="song-index">${index + 1}</div>
                <div class="song-img" style="${song.img ? `background-image: url('${song.img}');` : ''}"></div>
                <div class="song-details"><div>${song.title}</div><span>${song.artist}</span></div>
                <div class="song-time">${song.time}</div>
            `;
            listContainer.appendChild(item);
        });

        function checkPassword() {
            if(document.getElementById('password').value === "13.09.2025") { 
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
            } else { alert("Yanlış tarih... ❤️"); }
        }

        function selectSong(index) {
            currentSongIndex = index;
            const song = songs[index];
            
            document.getElementById('main-content').classList.add('card-active');
            document.getElementById('audio-source').src = song.file;
            
            const items = document.querySelectorAll('.song-item');
            items.forEach((item, i) => item.classList.toggle('active-song', i === index));
            
            audio.load(); audio.play();
            playBtn.innerText = "⏸";
            
            document.getElementById('song-title-display').innerText = song.title;
            document.getElementById('song-artist-display').innerText = song.artist;
            document.getElementById('big-cover').style.backgroundImage = song.img ? `url('${song.img}')` : 'none';
            document.getElementById('card-verse-text').innerText = song.verse;
        }

        function backToPlaylist() {
            document.getElementById('main-content').classList.remove('card-active');
        }

        function togglePlay() {
            if (currentSongIndex === -1) return;
            if (audio.paused) { audio.play(); playBtn.innerText = "⏸"; } 
            else { audio.pause(); playBtn.innerText = "▶"; }
        }

        function nextSong() { selectSong((currentSongIndex + 1) % songs.length); }
        function prevSong() { selectSong((currentSongIndex - 1 + songs.length) % songs.length); }

        audio.ontimeupdate = function() {
            const pct = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progress').style.width = pct + "%";
            document.getElementById('current-time').innerText = formatTime(audio.currentTime);
            document.getElementById('duration').innerText = formatTime(audio.duration);
        };

        function formatTime(s) {
            if (isNaN(s)) return "0:00";
            const m = Math.floor(s/60); const sc = Math.floor(s%60);
            return m + ":" + (sc < 10 ? "0" : "") + sc;
        }

        function seek(e) {
            const w = document.querySelector('.progress-container').clientWidth;
            audio.currentTime = (e.offsetX / w) * audio.duration;
        }
    </script>
</body>
</html>
